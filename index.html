<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatpati Duniya Links</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand" aria-label="Chatpati Duniya Links home">
        <img
          class="brand-logo"
          src="assets/logo.png"
          alt=""
          aria-hidden="true"
        />
        <span>Chatpati Duniya Links</span>
      </div>

      <form class="search-shell" role="search">
        <label class="sr-only" for="searchInput">Search videos</label>
        <input
          id="searchInput"
          type="search"
          placeholder="Search videos"
          autocomplete="off"
        />
        <button type="submit" aria-label="Search">
          <span aria-hidden="true">⌕</span>
        </button>
      </form>
    </header>

    <main class="page">
      <section class="monetization-panel" aria-label="Sponsored link">
        <div>
          <span class="sponsored-label">Sponsored</span>
          <h2>Discover today's featured content</h2>
          <p>Open the latest recommended link from Chatpati Duniya.</p>
        </div>
        <!-- SMARTLINK: replace this href with your Adsterra Smartlink URL. -->
        <a
          id="smartlinkCta"
          class="smartlink-cta"
          href="https://www.effectivecpmnetwork.com/t0m145b9yu?key=ac68ab4a64ab8250d289874d21b65980"
          target="_blank"
          rel="sponsored noopener noreferrer"
        >
          Explore now
        </a>
      </section>

      <section class="video-section" aria-labelledby="latestVideosHeading">
        <div class="section-heading">
          <h1 id="latestVideosHeading">Latest Videos</h1>
          <p>Fresh clips and trending links in one place.</p>
        </div>

        <aside id="nativeBanner" class="ad-slot native-banner" aria-label="Advertisement">
          <!-- NATIVE BANNER START
            Paste the complete Adsterra native banner code below this comment.
            Keep it inside #nativeBanner so it stays responsive.
          -->
          <div class="ad-placeholder" data-remove-when-ad-is-added>
            <p>Native advertisement</p>
            <span>Your Adsterra native banner will appear here.</span>
          </div>
          <!-- NATIVE BANNER END -->
        </aside>

        <div id="videoGrid" class="video-grid" aria-live="polite"></div>
        <p id="emptyState" class="empty-state" hidden>No videos found.</p>
      </section>
    </main>

    <script src="script.js"></script>

    <!-- POPUNDER START
      Paste the complete Adsterra popunder script directly below this comment.
      One popunder placement is enough; adding duplicates can hurt user retention.
    -->
    <!-- POPUNDER END -->

    <!-- SOCIAL BAR START
      Paste the complete Adsterra social bar script directly below this comment.
    -->
    <!-- SOCIAL BAR END -->
  </body>
</html>
